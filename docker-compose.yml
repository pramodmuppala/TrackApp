services:
  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --ssl-certfile /certs/localhost.crt --ssl-keyfile /certs/localhost.key
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - mailpit
    volumes:
      - .:/app
      - ./certs:/certs:ro

  worker:
    build: .
    command: python -m app.worker
    env_file:
      - .env
    depends_on:
      - db
      - mailpit
    volumes:
      - .:/app

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: usps_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres_data:
