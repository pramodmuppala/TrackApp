<svg width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .t  { font-size: 14px; fill: #2C2C2A; }
      .ts { font-size: 12px; fill: #5F5E5A; }
      .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
      .leader { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 4 4; fill: none; }
      .section-label { font-size: 11px; font-weight: 500; fill: #888780; letter-spacing: 0.06em; }
    </style>
  </defs>

  <!-- Background: Docker Compose boundary -->
  <rect x="160" y="80" width="370" height="380" rx="14" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="6 4"/>
  <text class="section-label" x="174" y="100">DOCKER COMPOSE</text>

  <!-- Browser (external) -->
  <g>
    <rect x="20" y="160" width="120" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text class="th" x="80" y="183" text-anchor="middle" dominant-baseline="central">Browser</text>
    <text class="ts" x="80" y="201" text-anchor="middle" dominant-baseline="central">localhost:8000</text>
  </g>

  <!-- Web service -->
  <g>
    <rect x="190" y="140" width="150" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text class="th" x="265" y="163" text-anchor="middle" dominant-baseline="central">Web service</text>
    <text class="ts" x="265" y="181" text-anchor="middle" dominant-baseline="central">FastAPI · Uvicorn · :8000</text>
  </g>

  <!-- Worker service -->
  <g>
    <rect x="190" y="260" width="150" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text class="th" x="265" y="283" text-anchor="middle" dominant-baseline="central">Worker service</text>
    <text class="ts" x="265" y="301" text-anchor="middle" dominant-baseline="central">APScheduler · background</text>
  </g>

  <!-- PostgreSQL -->
  <g>
    <rect x="390" y="140" width="120" height="60" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
    <text class="th" x="450" y="163" text-anchor="middle" dominant-baseline="central">PostgreSQL</text>
    <text class="ts" x="450" y="181" text-anchor="middle" dominant-baseline="central">postgres:16 · :5432</text>
  </g>

  <!-- Mailpit -->
  <g>
    <rect x="390" y="260" width="120" height="60" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text class="th" x="450" y="283" text-anchor="middle" dominant-baseline="central">Mailpit</text>
    <text class="ts" x="450" y="301" text-anchor="middle" dominant-baseline="central">SMTP :1025 · UI :8025</text>
  </g>

  <!-- USPS API (external) -->
  <g>
    <rect x="560" y="200" width="105" height="60" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text class="th" x="612" y="223" text-anchor="middle" dominant-baseline="central">USPS API</text>
    <text class="ts" x="612" y="241" text-anchor="middle" dominant-baseline="central">OAuth2 · REST</text>
  </g>

  <!-- Arrows: Browser ↔ Web -->
  <line x1="140" y1="183" x2="188" y2="170" class="arr" marker-end="url(#arrow)"/>
  <line x1="188" y1="178" x2="140" y2="191" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="165" y="168" text-anchor="middle">HTTP</text>

  <!-- Web → PostgreSQL -->
  <line x1="340" y1="163" x2="388" y2="163" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="364" y="157" text-anchor="middle">SQLAlchemy</text>

  <!-- Worker → PostgreSQL -->
  <line x1="340" y1="283" x2="388" y2="283" class="arr" marker-end="url(#arrow)" stroke="#3B6D11"/>
  <text class="ts" x="364" y="277" text-anchor="middle">SQLAlchemy</text>

  <!-- Worker → Mailpit -->
  <line x1="340" y1="303" x2="388" y2="303" class="arr" marker-end="url(#arrow)" stroke="#854F0B"/>
  <text class="ts" x="364" y="317" text-anchor="middle">SMTP</text>

  <!-- Worker → USPS -->
  <path d="M340 275 L550 275 L558 230" class="arr" marker-end="url(#arrow)" stroke="#993C1D"/>
  <text class="ts" x="468" y="261" text-anchor="middle">HTTPX · OAuth2</text>

  <!-- Web ↔ Worker (vertical) -->
  <line x1="255" y1="200" x2="255" y2="258" class="arr" marker-end="url(#arrow)" stroke="#534AB7" stroke-dasharray="5 3"/>
  <line x1="273" y1="258" x2="273" y2="200" class="arr" marker-end="url(#arrow)" stroke="#534AB7" stroke-dasharray="5 3"/>
  <text class="ts" x="295" y="232" text-anchor="start">shared DB</text>

  <!-- Legend -->
  <rect x="20" y="420" width="620" height="96" rx="8" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text class="section-label" x="34" y="440">LEGEND</text>
  <rect x="34" y="452" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="ts" x="52" y="463">Python services (FastAPI / APScheduler)</text>
  <rect x="240" y="452" width="12" height="12" rx="2" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text class="ts" x="258" y="463">PostgreSQL database</text>
  <rect x="420" y="452" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="ts" x="438" y="463">Mailpit (dev email)</text>
  <rect x="34" y="476" width="12" height="12" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="ts" x="52" y="487">External USPS API</text>
  <rect x="240" y="476" width="12" height="12" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="ts" x="258" y="487">Browser (user)</text>
  <line x1="420" y1="484" x2="440" y2="484" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="5 3" fill="none"/>
  <text class="ts" x="446" y="488">Inter-service communication</text>

  <!-- Title -->
  <text style="font-size:16px;font-weight:500;fill:#2C2C2A;" x="340" y="46" text-anchor="middle">TrackApp — System Architecture</text>
  <text class="ts" x="340" y="64" text-anchor="middle">USPS shipment tracking dashboard</text>
</svg>
