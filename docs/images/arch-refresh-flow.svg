<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .t  { font-size: 14px; fill: #2C2C2A; }
      .ts { font-size: 12px; fill: #5F5E5A; }
      .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
      .lifeline { stroke: #D3D1C7; stroke-width: 1; stroke-dasharray: 4 4; fill: none; }
      .loop-box { fill: #F1EFE8; stroke: #B4B2A9; stroke-width: 0.5; }
      .section-label { font-size: 10px; font-weight: 500; fill: #888780; letter-spacing: 0.07em; }
    </style>
  </defs>

  <!-- Title -->
  <text style="font-size:16px;font-weight:500;fill:#2C2C2A;" x="340" y="36" text-anchor="middle">TrackApp — Bulk Refresh Flow</text>
  <text class="ts" x="340" y="54" text-anchor="middle">Sequence: user triggers refresh → worker polls USPS → DB updated</text>

  <!-- Participants: 5 boxes across x=50,170,300,430,560 width=100 -->
  <!-- Browser -->
  <rect x="30" y="70" width="100" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="80" y="96" text-anchor="middle" dominant-baseline="central">Browser</text>

  <!-- Web -->
  <rect x="160" y="70" width="100" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="210" y="96" text-anchor="middle" dominant-baseline="central">Web (FastAPI)</text>

  <!-- PostgreSQL -->
  <rect x="290" y="70" width="100" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text class="th" x="340" y="96" text-anchor="middle" dominant-baseline="central">PostgreSQL</text>

  <!-- Worker -->
  <rect x="420" y="70" width="100" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="470" y="96" text-anchor="middle" dominant-baseline="central">Worker</text>

  <!-- USPS -->
  <rect x="550" y="70" width="100" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="600" y="96" text-anchor="middle" dominant-baseline="central">USPS API</text>

  <!-- Lifelines -->
  <line x1="80"  y1="114" x2="80"  y2="530" class="lifeline"/>
  <line x1="210" y1="114" x2="210" y2="530" class="lifeline"/>
  <line x1="340" y1="114" x2="340" y2="530" class="lifeline"/>
  <line x1="470" y1="114" x2="470" y2="530" class="lifeline"/>
  <line x1="600" y1="114" x2="600" y2="530" class="lifeline"/>

  <!-- Step 1: Browser → Web: POST /refresh -->
  <line x1="82" y1="148" x2="207" y2="148" class="arr" marker-end="url(#arrow)" stroke="#185FA5"/>
  <text class="ts" x="145" y="142" text-anchor="middle" fill="#185FA5">POST /refresh (tracking IDs)</text>

  <!-- Step 2: Web → DB: Queue jobs -->
  <line x1="212" y1="174" x2="337" y2="174" class="arr" marker-end="url(#arrow)" stroke="#3B6D11"/>
  <text class="ts" x="274" y="168" text-anchor="middle" fill="#3B6D11">Queue refresh jobs</text>

  <!-- Step 3: Web → Browser: 202 Accepted -->
  <line x1="207" y1="200" x2="82" y2="200" class="arr" marker-end="url(#arrow)" stroke="#888780" stroke-dasharray="5 3"/>
  <text class="ts" x="145" y="194" text-anchor="middle">202 Accepted</text>

  <!-- Loop box -->
  <rect x="390" y="222" width="260" height="218" rx="6" class="loop-box"/>
  <rect x="390" y="222" width="60" height="18" rx="3" fill="#B4B2A9"/>
  <text class="section-label" x="420" y="234" text-anchor="middle" fill="#fff">LOOP</text>
  <text class="ts" x="520" y="234" text-anchor="middle">APScheduler tick</text>

  <!-- Step 4: Worker → DB: Fetch pending -->
  <line x1="467" y1="258" x2="342" y2="258" class="arr" marker-end="url(#arrow)" stroke="#3B6D11"/>
  <text class="ts" x="404" y="252" text-anchor="middle" fill="#3B6D11">Fetch pending jobs</text>

  <!-- Step 5: Worker → USPS -->
  <line x1="472" y1="284" x2="597" y2="284" class="arr" marker-end="url(#arrow)" stroke="#993C1D"/>
  <text class="ts" x="534" y="278" text-anchor="middle" fill="#993C1D">GET tracking status</text>

  <!-- Step 6: USPS → Worker -->
  <line x1="597" y1="310" x2="472" y2="310" class="arr" marker-end="url(#arrow)" stroke="#888780" stroke-dasharray="5 3"/>
  <text class="ts" x="534" y="304" text-anchor="middle">Status response</text>

  <!-- Step 7: Worker → DB: Update status -->
  <line x1="467" y1="336" x2="342" y2="336" class="arr" marker-end="url(#arrow)" stroke="#3B6D11"/>
  <text class="ts" x="404" y="330" text-anchor="middle" fill="#3B6D11">Update shipment status</text>

  <!-- Step 8: Worker → Mailpit (email) -->
  <line x1="472" y1="362" x2="597" y2="362" class="arr" marker-end="url(#arrow)" stroke="#854F0B"/>
  <text class="ts" x="534" y="356" text-anchor="middle" fill="#854F0B">Email notification (SMTP)</text>

  <!-- Note on mailpit -->
  <rect x="551" y="372" width="90" height="26" rx="4" fill="#FAEEDA" stroke="#F9CB42" stroke-width="0.5"/>
  <text class="ts" x="596" y="389" text-anchor="middle" fill="#854F0B">via Mailpit</text>

  <!-- Step 9: Browser polls / GET dashboard -->
  <line x1="82" y1="460" x2="207" y2="460" class="arr" marker-end="url(#arrow)" stroke="#185FA5"/>
  <text class="ts" x="145" y="454" text-anchor="middle" fill="#185FA5">GET / (dashboard reload)</text>

  <!-- Step 10: Web → DB -->
  <line x1="212" y1="484" x2="337" y2="484" class="arr" marker-end="url(#arrow)" stroke="#3B6D11"/>
  <text class="ts" x="274" y="478" text-anchor="middle" fill="#3B6D11">Fetch updated shipments</text>

  <!-- Step 11: Web → Browser: HTML -->
  <line x1="207" y1="508" x2="82" y2="508" class="arr" marker-end="url(#arrow)" stroke="#888780" stroke-dasharray="5 3"/>
  <text class="ts" x="145" y="502" text-anchor="middle">Rendered HTML (Jinja2)</text>
</svg>
